<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--text:#f0f0f0;--text-muted:#666;--text-dim:#999;--accent:#e8ff47;--accent-dim:rgba(232,255,71,0.12);--red:#ff4d4d;--red-dim:rgba(255,77,77,0.12);--orange:#ff9500;--orange-dim:rgba(255,149,0,0.12);--green:#3ddc84;--green-dim:rgba(61,220,132,0.12);--blue:#4d9eff;--blue-dim:rgba(77,158,255,0.12);--purple:#b97fff;--purple-dim:rgba(185,127,255,0.12);--radius:12px;--radius-sm:8px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:40px;}
.login-title{font-size:26px;font-weight:600;margin-bottom:6px;text-align:center;}
.login-sub{color:var(--text-muted);font-size:13px;margin-bottom:32px;text-align:center;}
.users-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px;margin-bottom:28px;}
.user-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px 12px;cursor:pointer;transition:all 0.2s;text-align:center;color:var(--text);}
.user-btn.selected{border-color:var(--accent);background:var(--accent-dim);}
.user-name{font-size:16px;font-weight:600;}
.pin-section{width:100%;max-width:360px;}
.pin-label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;}
.pin-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:15px;color:var(--text);font-size:20px;font-family:'DM Mono',monospace;letter-spacing:8px;text-align:center;outline:none;transition:border-color 0.2s;}
.pin-input:focus{border-color:var(--accent);}
.login-btn{width:100%;margin-top:14px;background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.login-error{color:var(--red);font-size:12px;margin-top:8px;text-align:center;min-height:18px;}
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;flex-direction:column;}
.topbar-greeting{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:1px;}
.topbar-user{font-size:15px;font-weight:600;}
.notif-bell{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:white;border-radius:50%;width:17px;height:17px;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;}
.content{flex:1;padding:14px;max-width:600px;margin:0 auto;width:100%;}
.tabs{display:flex;gap:3px;background:var(--surface);border-radius:var(--radius);padding:3px;margin-bottom:14px;}
.tab{flex:1;padding:8px 3px;border:none;border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.tab.active{background:var(--surface2);color:var(--text);}
.search-bar{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;transition:border-color 0.2s;}
.search-bar:focus{border-color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:14px;}
.form-group{margin-bottom:13px;}
.form-label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:6px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);}
.form-textarea{resize:none;min-height:80px;}
.form-select option{background:#242424;}
.importancia-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.imp-btn{padding:9px 6px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:11px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.imp-btn.alta.selected{border-color:var(--red);background:var(--red-dim);color:var(--red);}
.imp-btn.media.selected{border-color:var(--orange);background:var(--orange-dim);color:var(--orange);}
.imp-btn.baja.selected{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.foto-area{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center;cursor:pointer;color:var(--text-muted);font-size:12px;position:relative;overflow:hidden;}
.foto-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.foto-preview{width:100%;border-radius:var(--radius-sm);margin-top:8px;display:none;max-height:180px;object-fit:cover;}
.submit-btn{width:100%;background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--radius);padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:2px;}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
.reporte-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:9px;cursor:pointer;}
.reporte-card.resuelto{opacity:0.5;}
.reporte-card.en-proceso{border-left:3px solid var(--blue);}
.reporte-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px;gap:8px;}
.reporte-depa{font-size:14px;font-weight:600;}
.reporte-cat{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:2px;}
.badges{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0;}
.badge{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1px;padding:3px 7px;border-radius:20px;white-space:nowrap;font-weight:500;}
.badge-alta{background:var(--red-dim);color:var(--red);}
.badge-media{background:var(--orange-dim);color:var(--orange);}
.badge-baja{background:var(--green-dim);color:var(--green);}
.badge-resuelto{background:var(--green-dim);color:var(--green);}
.badge-proceso{background:var(--blue-dim);color:var(--blue);}
.reporte-desc{font-size:12px;color:var(--text-dim);line-height:1.5;margin-bottom:8px;}
.reporte-footer{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;}
.reporte-meta{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.reporte-btns{display:flex;gap:5px;}
.btn-sm{border-radius:var(--radius-sm);padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid;}
.btn-proceso{background:var(--blue-dim);color:var(--blue);border-color:var(--blue);}
.btn-resolver{background:var(--green-dim);color:var(--green);border-color:var(--green);}
.asignado-chip{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple);margin-left:6px;}
.horas-badge{display:inline-block;font-size:10px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:20px;background:var(--orange-dim);color:var(--orange);margin-left:4px;vertical-align:middle;}
.horas-badge.critico{background:var(--red-dim);color:var(--red);}
.visto-bar{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty-state .empty-icon{font-size:34px;margin-bottom:10px;}
.empty-state p{font-size:13px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 18px;font-size:13px;font-weight:500;z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:20px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-depa{font-size:19px;font-weight:600;margin-bottom:2px;}
.modal-meta{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:12px;}
.modal-desc{font-size:13px;line-height:1.6;color:var(--text-dim);margin-bottom:14px;}
.modal-img{width:100%;border-radius:var(--radius-sm);margin-bottom:14px;max-height:240px;object-fit:cover;display:none;}
.modal-actions{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text-muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.modal-proceso{background:var(--blue-dim);border:1px solid var(--blue);border-radius:var(--radius-sm);padding:10px 14px;color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.modal-resolver{flex:1;background:var(--green);border:none;border-radius:var(--radius-sm);padding:10px 14px;color:#0f0f0f;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.modal-delete{background:var(--red-dim);border:1px solid var(--red);border-radius:var(--radius-sm);padding:10px 12px;color:var(--red);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.section-label{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.comentarios-lista{margin-bottom:10px;}
.comentario{background:var(--surface2);border-radius:var(--radius-sm);padding:9px 11px;margin-bottom:7px;}
.comentario-autor{font-size:10px;font-family:'DM Mono',monospace;color:var(--accent);margin-bottom:3px;}
.comentario-texto{font-size:12px;color:var(--text-dim);line-height:1.4;}
.comentario-fecha{font-size:10px;color:var(--text-muted);margin-top:3px;}
.comentario-form{display:flex;gap:7px;}
.comentario-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
.comentario-input:focus{border-color:var(--accent);}
.comentario-send{background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--radius-sm);padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.visto-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.visto-chip{font-size:10px;font-family:'DM Mono',monospace;padding:3px 7px;border-radius:20px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
.visto-chip.si{border-color:var(--green);color:var(--green);background:var(--green-dim);}

.acceso-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.acceso-btn{padding:9px 6px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:11px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'DM Sans',sans-serif;line-height:1.3;}
.acceso-btn.puede.selected{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.acceso-btn.espera.selected{border-color:var(--orange);background:var(--orange-dim);color:var(--orange);}
.acceso-btn.presencia.selected{border-color:var(--blue);background:var(--blue-dim);color:var(--blue);}
.acceso-chip{font-size:11px;font-family:'DM Sans',sans-serif;padding:3px 9px;border-radius:20px;font-weight:500;display:inline-block;margin-top:6px;}
.acceso-chip.puede{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
.acceso-chip.espera{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange);}
.acceso-chip.presencia{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue);}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 11px;color:var(--text-muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">Reportes · Operación</div>
  <div class="login-title">¿Quién eres?</div>
  <div class="login-sub">Selecciona tu nombre e ingresa tu PIN</div>
  <div class="users-grid">
    <div class="user-btn" onclick="selectUser('daniel',this)"><div class="user-name">Daniel</div></div>
    <div class="user-btn" onclick="selectUser('rodrigo',this)"><div class="user-name">Rodrigo</div></div>
    <div class="user-btn" onclick="selectUser('paulo',this)"><div class="user-name">Paulo</div></div>
    <div class="user-btn" onclick="selectUser('josimar',this)"><div class="user-name">Josimar</div></div>
    <div class="user-btn" onclick="selectUser('daniela',this)"><div class="user-name">Daniela</div></div>
    <div class="user-btn" onclick="selectUser('zayda',this)"><div class="user-name">Zayda</div></div>
  </div>
  <div class="pin-section">
    <div class="pin-label">PIN de acceso</div>
    <input type="password" class="pin-input" id="pinInput" maxlength="4" placeholder="••••" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-greeting">BIENVENIDO</span>
      <span class="topbar-user" id="topbarUser">—</span>
    </div>
    <div style="display:flex;gap:7px;align-items:center;">
      <div class="notif-bell" onclick="switchTab('pendientes')">🔔<div class="notif-badge" id="notifBadge">0</div></div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="content">
    <div class="tabs" id="tabsContainer"></div>
    <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Buscar..." oninput="renderLista()" style="display:none;">
    <div id="nuevoReporteSection" style="display:none;">
      <div class="card">
        <div class="card-title">Nuevo Reporte</div>
        <div class="form-group">
          <label class="form-label">Departamento</label>
          <input type="text" class="form-input" id="inputDepa" placeholder="Ej: Rincón 104">
        </div>
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select class="form-select" id="inputCategoria">
            <option value="">Selecciona una categoría</option>
            <option value="Electricidad">Electricidad</option>
            <option value="Agua caliente">Agua caliente</option>
            <option value="Filtración">Filtración</option>
            <option value="Wifi">Wifi</option>
            <option value="Limpieza">Limpieza</option>
            <option value="Otros">Otros</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Descripción</label>
          <textarea class="form-textarea" id="inputDesc" placeholder="Describe el problema..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Importancia</label>
          <div class="importancia-grid">
            <button class="imp-btn alta" onclick="selectImportancia('alta')">🔴 Alta</button>
            <button class="imp-btn media" onclick="selectImportancia('media')">🟡 Media</button>
            <button class="imp-btn baja" onclick="selectImportancia('baja')">🟢 Baja</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Asignar a (opcional)</label>
          <select class="form-select" id="inputAsignar">
            <option value="">Sin asignar</option>
            <option value="Rodrigo">Rodrigo</option>
            <option value="Paulo">Paulo</option>
            <option value="Josimar">Josimar</option>
            <option value="Daniela">Daniela</option>
            <option value="Zayda">Zayda</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">Acceso al departamento</label>
          <div class="acceso-grid">
            <button class="acceso-btn puede" onclick="selectAcceso('puede')">✅ Puede entrar</button>
            <button class="acceso-btn espera" onclick="selectAcceso('espera')">⌛ En espera de respuesta</button>
            <button class="acceso-btn presencia" onclick="selectAcceso('presencia')">👤 Requiere presencia</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Foto (opcional)</label>
          <div class="foto-area">
            📷 Toca para agregar foto
            <input type="file" accept="image/*" id="fotoInput" onchange="previewFoto(this)">
          </div>
          <img id="fotoPreview" class="foto-preview">
        </div>
        <button class="submit-btn" id="submitBtn" onclick="crearReporte()">Enviar Reporte</button>
      </div>
    </div>
    <div id="listaReportes"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="cerrarModalSiClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px;">
      <div class="modal-depa" id="modalDepa"></div>
      <div id="modalEstadoBadge"></div>
    </div>
    <div class="modal-meta" id="modalMeta"></div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
      <div id="modalImpBadge"></div>
      <div id="modalAsignadoBadge"></div>
    </div>
    <div id="modalAcceso" style="margin-bottom:12px;"></div>
    <img id="modalImg" class="modal-img">
    <div class="modal-desc" id="modalDesc"></div>
    <div id="modalResolverInfo" style="display:none;margin-bottom:12px;">
      <div class="section-label">Resuelto por</div>
      <div id="modalResolverNombre" style="font-size:12px;color:var(--text-dim);"></div>
    </div>
    <div class="modal-actions" id="modalActions"></div>
    <div id="accesoSelector"></div>
    <div class="divider"></div>
    <div class="section-label">Comentarios</div>
    <div class="comentarios-lista" id="comentariosLista"></div>
    <div class="comentario-form">
      <input type="text" class="comentario-input" id="comentarioInput" placeholder="Escribe un comentario..." onkeydown="if(event.key==='Enter')enviarComentario()">
      <button class="comentario-send" onclick="enviarComentario()">Enviar</button>
    </div>
    <div class="divider"></div>
    <div class="section-label">Visto por</div>
    <div class="visto-chips" id="vistoChips"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var TG_TOKEN   = '8462112004:AAFa8ZBfoJmHLg2pljfZmmIqstSGuEgSsjc';
var TG_CHAT_ID = '-5227411507';
var HORAS_CRITICO = 8;

var USUARIOS = {
  daniel:  { nombre:'Daniel',  pin:'1111', puedeCrear:true,  puedeResolver:false, puedeBorrar:true  },

function sendTelegram(msg){
  fetch('https://api.telegram.org/bot'+TG_TOKEN+'/sendMessage',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:TG_CHAT_ID,text:msg,parse_mode:'HTML'})
  }).catch(function(){});
}

function fmt(d){
  if(!d) return '—';
  try { return new Date(d).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
  catch(e){ return '—'; }
}

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type||''); t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3500);
}

function getFecha(r){
  try {
    if(r.fecha && r.fecha.toDate) return r.fecha.toDate();
    if(r.fecha) return new Date(r.fecha);
  } catch(e){}
  return new Date();
}

function safe(val){ return val || ''; }

// LOGIN
function selectUser(key,el){
  selectedUserKey=key;
  document.querySelectorAll('.user-btn').forEach(function(b){b.classList.remove('selected');});
  (el||event.currentTarget).classList.add('selected');
  document.getElementById('pinInput').focus();
  document.getElementById('loginError').textContent='';
}

function doLogin(){
  var pin=document.getElementById('pinInput').value.trim();
  if(!selectedUserKey){document.getElementById('loginError').textContent='Selecciona tu nombre primero';return;}
  if(!pin){document.getElementById('loginError').textContent='Ingresa tu PIN';return;}
  var u=USUARIOS[selectedUserKey];
  if(!u||u.pin!==pin){document.getElementById('loginError').textContent='PIN incorrecto';return;}
  currentKey=selectedUserKey; currentUser=u.nombre;
  enterApp();
}

function doLogout(){
  if(unsubscribe)unsubscribe();
  currentKey=null; currentUser=null; reportesCache=[];
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('pinInput').value='';
  document.getElementById('loginError').textContent='';
  selectedUserKey=null;
  document.querySelectorAll('.user-btn').forEach(function(b){b.classList.remove('selected');});
}

function enterApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topbarUser').textContent=currentUser;
  var u=USUARIOS[currentKey];
  var tabs=u.puedeCrear
    ?'<button class="tab" onclick="switchTab(\'nuevo\')">+ Nuevo</button><button class="tab active" onclick="switchTab(\'pendientes\')">Pendientes</button><button class="tab" onclick="switchTab(\'proceso\')">En proceso</button><button class="tab" onclick="switchTab(\'resueltos\')">Resueltos</button>'
    :'<button class="tab active" onclick="switchTab(\'pendientes\')">Pendientes</button><button class="tab" onclick="switchTab(\'proceso\')">En proceso</button><button class="tab" onclick="switchTab(\'resueltos\')">Resueltos</button>';
  document.getElementById('tabsContainer').innerHTML=tabs;

  var q=db.collection('reportes').orderBy('fecha','desc');
  unsubscribe=q.onSnapshot(function(snapshot){
    reportesCache=snapshot.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    if(currentTab!=='nuevo') renderLista();
    updateNotifBadge();
    if(modalReporteId) refreshModal(modalReporteId);
  }, function(err){ showToast('Error de conexión','error'); console.error(err); });

  switchTab('pendientes');
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  var map={nuevo:'+ Nuevo',pendientes:'Pendientes',proceso:'En proceso',resueltos:'Resueltos'};
  document.querySelectorAll('.tab').forEach(function(t){
    if(t.textContent.trim()===(map[tab]||tab)) t.classList.add('active');
  });
  document.getElementById('nuevoReporteSection').style.display=(tab==='nuevo')?'block':'none';
  document.getElementById('listaReportes').style.display=(tab!=='nuevo')?'block':'none';
  document.getElementById('searchBar').style.display=(tab!=='nuevo')?'block':'none';
  if(tab!=='nuevo') renderLista();
}

function previewFoto(input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    fotoBase64=e.target.result;
    var p=document.getElementById('fotoPreview');
    p.src=fotoBase64; p.style.display='block';
  };
  reader.readAsDataURL(input.files[0]);
}

function selectImportancia(nivel){
  selectedImportancia=nivel;
  ['alta','media','baja'].forEach(function(n){
    document.querySelectorAll('.imp-btn.'+n).forEach(function(b){b.classList.toggle('selected',n===nivel);});
  });
}

function selectAcceso(tipo){
  selectedAcceso=tipo;
  document.querySelectorAll('.acceso-btn').forEach(function(b){b.classList.remove('selected');});
  document.querySelectorAll('.acceso-btn.'+tipo).forEach(function(b){b.classList.add('selected');});
}

function crearReporte(){
  var depa=document.getElementById('inputDepa').value.trim();
  var categoria=document.getElementById('inputCategoria').value;
  var desc=document.getElementById('inputDesc').value.trim();
  var asignar=document.getElementById('inputAsignar').value;
  if(!depa){showToast('Escribe el departamento','error');return;}
  if(!categoria){showToast('Selecciona una categoría','error');return;}
  if(!desc){showToast('Escribe la descripción','error');return;}
  if(!selectedImportancia){showToast('Selecciona la importancia','error');return;}
  if(!selectedAcceso){showToast('Selecciona el acceso','error');return;}
  var btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='Enviando...';
  db.collection('reportes').add({
    depa:depa, categoria:categoria, desc:desc,
    importancia:selectedImportancia,
    asignadoA:asignar||'',
    creadoPor:currentUser,
    acceso:selectedAcceso||'espera',
    fecha:firebase.firestore.FieldValue.serverTimestamp(),
    estado:'pendiente',
    resolverPor:'', resolverFecha:null,
    foto:fotoBase64||'',
    vistosPor:[currentUser],
    comentarios:[]
  }).then(function(){
    var impEmoji={alta:'🔴',media:'🟡',baja:'🟢'}[selectedImportancia];
    var impLabel={alta:'ALTA',media:'MEDIA',baja:'BAJA'}[selectedImportancia];
    var asigMsg=asignar?'\n👤 Asignado a: <b>'+asignar+'</b>':'';
    sendTelegram(impEmoji+' <b>REPORTE NUEVO</b>\n\n📍 <b>'+depa+'</b>\n🏷 '+categoria+'\n⚠️ Importancia: <b>'+impLabel+'</b>\n📝 '+desc+(fotoBase64?' 📷':'')+asigMsg+'\n\n✍️ Por: '+currentUser+'\n🕐 '+fmt(new Date()));
    document.getElementById('inputDepa').value='';
    document.getElementById('inputCategoria').value='';
    document.getElementById('inputDesc').value='';
    document.getElementById('inputAsignar').value='';
    document.getElementById('fotoPreview').style.display='none';
    document.getElementById('fotoInput').value='';
    fotoBase64=null; selectedImportancia=null; selectedAcceso=null;
    document.querySelectorAll('.acceso-btn').forEach(function(b){b.classList.remove('selected');});
    ['alta','media','baja'].forEach(function(n){document.querySelectorAll('.imp-btn.'+n).forEach(function(b){b.classList.remove('selected');});});
    showToast('Reporte enviado ✅','success');
    switchTab('pendientes');
  }).catch(function(e){showToast('Error al enviar','error');console.error(e);})
  .finally(function(){btn.disabled=false;btn.textContent='Enviar Reporte';});
}

function renderLista(){
  var container=document.getElementById('listaReportes');
  var busqueda=(document.getElementById('searchBar').value||'').toLowerCase().trim();
  var filtrados=reportesCache.filter(function(r){
    var estadoOk = (currentTab==='pendientes' && r.estado==='pendiente')
                || (currentTab==='proceso'    && r.estado==='en-proceso')
                || (currentTab==='resueltos'  && r.estado==='resuelto');
    if(!estadoOk) return false;
    if(!busqueda) return true;
    return (safe(r.depa)+safe(r.desc)+safe(r.categoria)).toLowerCase().includes(busqueda);
  });

  var orden={alta:0,media:1,baja:2};
  if(currentTab!=='resueltos') filtrados.sort(function(a,b){return (orden[a.importancia]||0)-(orden[b.importancia]||0);});

  if(!filtrados.length){
    var msgs={pendientes:'No hay reportes pendientes',proceso:'No hay reportes en proceso',resueltos:'No hay reportes resueltos'};
    container.innerHTML='<div class="empty-state"><div class="empty-icon">'+(currentTab==='resueltos'?'📋':'✅')+'</div><p>'+(msgs[currentTab]||'')+'</p></div>';
    return;
  }

  var ahora=new Date();
  var u=USUARIOS[currentKey];
  var html='';
  for(var i=0;i<filtrados.length;i++){
    var r=filtrados[i];
    try {
      var impLabel={alta:'🔴 ALTA',media:'🟡 MEDIA',baja:'🟢 BAJA'}[r.importancia]||r.importancia;
      var fecha=getFecha(r);
      var horasBadge='';
      if(r.estado==='pendiente'||r.estado==='en-proceso'){
        var h=Math.floor((ahora-fecha)/3600000);
        if(h>0) horasBadge='<span class="horas-badge'+(h>=HORAS_CRITICO?' critico':'')+'">'+h+'h</span>';
      }
      var vistos=r.vistosPor||[];
      var nComentarios=(r.comentarios||[]).length;
      var comentBadge=nComentarios>0?'<span style="font-size:10px;color:var(--text-muted);margin-left:5px;font-family:\'DM Mono\',monospace;">💬'+nComentarios+'</span>':'';
      var asigChip=safe(r.asignadoA)?'<span class="asignado-chip">→ '+r.asignadoA+'</span>':'';
      var accesoMap={'puede':'✅ Puede entrar','espera':'⌛ En espera','presencia':'👤 Requiere presencia'};
      var accesoChip=r.acceso?'<span class="acceso-chip '+r.acceso+'">'+accesoMap[r.acceso]+'</span>':'';
      var estadoBadge=r.estado==='resuelto'?'<span class="badge badge-resuelto">RESUELTO</span>':r.estado==='en-proceso'?'<span class="badge badge-proceso">EN PROCESO</span>':'';
      var fotoIcon=safe(r.foto)?'📷 ':'';

        btns='<div class="reporte-btns">'
          +'<button class="btn-sm btn-proceso" onclick="event.stopPropagation();cambiarEstado(\''+r.id+'\',\'en-proceso\')">⏳</button>'
          +'<button class="btn-sm btn-resolver" onclick="event.stopPropagation();resolver(\''+r.id+'\')">✓</button>'
          +'</div>';
      } else if(r.estado==='en-proceso'&&u.puedeResolver){
        btns='<div class="reporte-btns">'
          +'<button class="btn-sm btn-resolver" onclick="event.stopPropagation();resolver(\''+r.id+'\')">✓ Listo</button>'
          +'</div>';
      }
      html+='<div class="reporte-card'+(r.estado==='resuelto'?' resuelto':r.estado==='en-proceso'?' en-proceso':'')+'" onclick="openModal(\''+r.id+'\')">'

          +'<div><div class="reporte-depa">'+fotoIcon+safe(r.depa)+horasBadge+comentBadge+'</div>'
          +'<div class="reporte-cat">'+safe(r.categoria)+asigChip+'</div>'+accesoChip+'</div>'

        +'<div class="reporte-footer">'
          +'<span class="reporte-meta">'+fmt(fecha)+(r.estado==='resuelto'&&safe(r.resolverPor)?' · '+r.resolverPor:'')+(safe(r.creadoPor)?' · '+r.creadoPor:'')+'</span>'

function cambiarEstado(id,estado){
  var r=reportesCache.find(function(x){return x.id===id;});
  if(!r)return;
  db.collection('reportes').doc(id).update({estado:estado}).then(function(){
    if(estado==='en-proceso') sendTelegram('⏳ <b>EN PROCESO</b>\n\n📍 <b>'+safe(r.depa)+'</b>\n📝 '+safe(r.desc)+'\n\n👤 Atendiendo: <b>'+currentUser+'</b>\n🕐 '+fmt(new Date()));
    showToast('Actualizado','success');
  }).catch(function(){showToast('Error','error');});
}

function resolver(id){
  var r=reportesCache.find(function(x){return x.id===id;});
  if(!r)return;
  db.collection('reportes').doc(id).update({
    estado:'resuelto', resolverPor:currentUser,
    resolverFecha:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    sendTelegram('✅ <b>REPORTE RESUELTO</b>\n\n📍 <b>'+safe(r.depa)+'</b>\n🏷 '+safe(r.categoria)+'\n📝 '+safe(r.desc)+'\n\n👤 Resuelto por: <b>'+currentUser+'</b>\n🕐 '+fmt(new Date()));
    closeModalDirect();
    showToast('Resuelto ✅','success');
  }).catch(function(){showToast('Error','error');});
}

function borrarReporte(id){
  if(!confirm('¿Borrar este reporte?'))return;
  db.collection('reportes').doc(id).delete().then(function(){
    closeModalDirect();
    showToast('Borrado','success');
  }).catch(function(){showToast('Error','error');});
}

function enviarComentario(){
  var texto=document.getElementById('comentarioInput').value.trim();
  if(!texto||!modalReporteId)return;
  var r=reportesCache.find(function(x){return x.id===modalReporteId;});
  if(!r)return;
  var comentarios=(r.comentarios||[]).slice();
  comentarios.push({autor:currentUser,texto:texto,fecha:new Date().toISOString()});
  db.collection('reportes').doc(modalReporteId).update({comentarios:comentarios}).then(function(){
    document.getElementById('comentarioInput').value='';
  }).catch(function(){showToast('Error','error');});
}

function openModal(id){
  var r=reportesCache.find(function(x){return x.id===id;});
  if(!r)return;
  modalReporteId=id;
  var vistos=r.vistosPor||[];
  if(vistos.indexOf(currentUser)===-1){
    vistos=vistos.concat([currentUser]);
    db.collection('reportes').doc(id).update({vistosPor:vistos}).catch(function(){});
  }
  renderModal(r);
  document.getElementById('modalOverlay').classList.add('open');
}

function refreshModal(id){
  if(!document.getElementById('modalOverlay').classList.contains('open'))return;
  var r=reportesCache.find(function(x){return x.id===id;});
  if(r) renderModal(r);
}

function renderModal(r){
  var u=USUARIOS[currentKey];
  document.getElementById('modalDepa').textContent=safe(r.depa);
  var fecha=getFecha(r);
  document.getElementById('modalMeta').textContent=safe(r.categoria)+(safe(r.creadoPor)?' · por '+r.creadoPor:'')+' · '+fmt(fecha);
  document.getElementById('modalImpBadge').innerHTML='<span class="badge badge-'+safe(r.importancia)+'">'+(r.importancia==='alta'?'🔴 ALTA':r.importancia==='media'?'🟡 MEDIA':'🟢 BAJA')+'</span>';
  document.getElementById('modalAsignadoBadge').innerHTML=safe(r.asignadoA)?'<span class="asignado-chip">→ '+r.asignadoA+'</span>':'';
  var accesoMapM={'puede':'✅ Puede entrar','espera':'⌛ En espera de respuesta','presencia':'👤 Requiere presencia'};
  document.getElementById('modalAcceso').innerHTML=r.acceso?'<span class="acceso-chip '+r.acceso+'">'+accesoMapM[r.acceso]+'</span> <button onclick="abrirCambioAcceso(\''+r.id+'\')" style="background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--text-muted);font-size:11px;cursor:pointer;margin-left:6px;font-family:DM Sans,sans-serif;">Cambiar</button>':'';
  document.getElementById('modalEstadoBadge').innerHTML=r.estado==='resuelto'?'<span class="badge badge-resuelto">RESUELTO</span>':r.estado==='en-proceso'?'<span class="badge badge-proceso">EN PROCESO</span>':'';
  document.getElementById('modalDesc').textContent=safe(r.desc);
  var img=document.getElementById('modalImg');
  if(safe(r.foto)){img.src=r.foto;img.style.display='block';}else img.style.display='none';
  var ri=document.getElementById('modalResolverInfo');
  if(r.estado==='resuelto'&&safe(r.resolverPor)){
    ri.style.display='block';
    var rf=r.resolverFecha&&r.resolverFecha.toDate?r.resolverFecha.toDate():new Date();
    document.getElementById('modalResolverNombre').textContent=r.resolverPor+' · '+fmt(rf);
  } else ri.style.display='none';

  var actions='<button class="modal-close" onclick="closeModalDirect()">Cerrar</button>';
  if(r.estado==='pendiente'&&u.puedeResolver) actions+='<button class="modal-proceso" onclick="cambiarEstado(\''+r.id+'\',\'en-proceso\')">⏳ En proceso</button>';
  if(r.estado!=='resuelto'&&u.puedeResolver) actions+='<button class="modal-resolver" onclick="resolver(\''+r.id+'\')">✓ Resuelto</button>';
  if(u.puedeBorrar) actions+='<button class="modal-delete" onclick="borrarReporte(\''+r.id+'\')">🗑</button>';
  document.getElementById('modalActions').innerHTML=actions;

  var comentarios=r.comentarios||[];
  document.getElementById('comentariosLista').innerHTML=comentarios.length===0
    ?'<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">Sin comentarios aún</div>'
    :comentarios.map(function(c){return'<div class="comentario"><div class="comentario-autor">'+safe(c.autor)+'</div><div class="comentario-texto">'+safe(c.texto)+'</div><div class="comentario-fecha">'+fmt(c.fecha)+'</div></div>';}).join('');

  var vistos=r.vistosPor||[];
  document.getElementById('vistoChips').innerHTML=TODOS.map(function(nombre){
    var vio=vistos.indexOf(nombre)!==-1;
    return'<span class="visto-chip'+(vio?' si':'')+'">'+nombre+(vio?' ✓':'')+'</span>';
  }).join('');
}

function abrirCambioAcceso(id){
  var opciones=[
    {key:'puede',label:'✅ Puede entrar'},
    {key:'espera',label:'⌛ En espera de respuesta'},
    {key:'presencia',label:'👤 Requiere presencia'}
  ];
  var html='<div style="margin-top:12px;"><div class="section-label" style="margin-bottom:8px;">Cambiar acceso</div><div style="display:flex;flex-direction:column;gap:6px;">';
  opciones.forEach(function(o){
    html+='<button onclick="cambiarAcceso(\''+id+'\',\''+o.key+'\')" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:13px;cursor:pointer;font-family:DM Sans,sans-serif;text-align:left;">'+o.label+'</button>';
  });
  html+='</div></div>';
  document.getElementById('accesoSelector').innerHTML=html;
}

function cambiarAcceso(id,acceso){
  db.collection('reportes').doc(id).update({acceso:acceso}).then(function(){
    document.getElementById('accesoSelector').innerHTML='';
    showToast('Acceso actualizado','success');
  }).catch(function(){showToast('Error','error');});
}

function cerrarModalSiClick(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('open');modalReporteId=null;document.getElementById('accesoSelector').innerHTML='';}

function updateNotifBadge(){
  if(!currentKey)return;
  var n=reportesCache.filter(function(r){return r.estado==='pendiente'||r.estado==='en-proceso';}).length;
  var b=document.getElementById('notifBadge');
  b.style.display=n>0?'flex':'none'; b.textContent=n;
}
