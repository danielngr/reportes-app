<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes de Mantenimiento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424; --border:#2e2e2e;
    --text:#f0f0f0; --text-muted:#666; --text-dim:#999;
    --accent:#e8ff47; --accent-dim:rgba(232,255,71,0.12);
    --red:#ff4d4d; --red-dim:rgba(255,77,77,0.12);
    --orange:#ff9500; --orange-dim:rgba(255,149,0,0.12);
    --green:#3ddc84; --green-dim:rgba(61,220,132,0.12);
    --radius:12px; --radius-sm:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  #loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .login-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:48px;}
  .login-title{font-size:28px;font-weight:600;margin-bottom:8px;text-align:center;}
  .login-sub{color:var(--text-muted);font-size:14px;margin-bottom:40px;text-align:center;}
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px;margin-bottom:32px;}
  .role-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 16px;cursor:pointer;transition:all 0.2s;text-align:center;color:var(--text);}
  .role-btn:hover,.role-btn.selected{border-color:var(--accent);background:var(--accent-dim);}
  .role-btn .role-icon{font-size:24px;margin-bottom:8px;}
  .role-btn .role-name{font-size:13px;font-weight:500;}
  .pin-section{width:100%;max-width:360px;}
  .pin-label{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:2px;margin-bottom:12px;text-transform:uppercase;}
  .pin-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;color:var(--text);font-size:20px;font-family:'DM Mono',monospace;letter-spacing:8px;text-align:center;outline:none;transition:border-color 0.2s;}
  .pin-input:focus{border-color:var(--accent);}
  .login-btn{width:100%;margin-top:16px;background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--radius);padding:16px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .login-error{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:20px;}
  #app{display:none;flex-direction:column;min-height:100vh;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .topbar-left{display:flex;flex-direction:column;}
  .topbar-greeting{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:1px;}
  .topbar-user{font-size:16px;font-weight:600;}
  .notif-bell{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;}
  .notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:white;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;}
  .content{flex:1;padding:20px;max-width:600px;margin:0 auto;width:100%;}
  .tabs{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius);padding:4px;margin-bottom:24px;}
  .tab{flex:1;padding:10px;border:none;border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
  .tab.active{background:var(--surface2);color:var(--text);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .card-title{font-size:13px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:16px;}
  .form-group{margin-bottom:16px;}
  .form-label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:8px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;}
  .form-input,.form-textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
  .form-input:focus,.form-textarea:focus{border-color:var(--accent);}
  .form-textarea{resize:none;min-height:90px;}
  .importancia-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .imp-btn{padding:10px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
  .imp-btn.alta.selected{border-color:var(--red);background:var(--red-dim);color:var(--red);}
  .imp-btn.media.selected{border-color:var(--orange);background:var(--orange-dim);color:var(--orange);}
  .imp-btn.baja.selected{border-color:var(--green);background:var(--green-dim);color:var(--green);}
  .submit-btn{width:100%;background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .reporte-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color 0.2s;}
  .reporte-card:hover{border-color:#3e3e3e;}
  .reporte-card.resuelto{opacity:0.5;}
  .reporte-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:12px;}
  .reporte-depa{font-size:16px;font-weight:600;}
  .badge{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1px;padding:4px 8px;border-radius:20px;white-space:nowrap;font-weight:500;}
  .badge-alta{background:var(--red-dim);color:var(--red);}
  .badge-media{background:var(--orange-dim);color:var(--orange);}
  .badge-baja{background:var(--green-dim);color:var(--green);}
  .badge-resuelto{background:var(--green-dim);color:var(--green);}
  .reporte-desc{font-size:14px;color:var(--text-dim);line-height:1.5;margin-bottom:12px;}
  .reporte-footer{display:flex;align-items:center;justify-content:space-between;}
  .reporte-meta{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;}
  .resolver-btn{background:var(--green-dim);color:var(--green);border:1px solid var(--green);border-radius:var(--radius-sm);padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
  .empty-state .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-state p{font-size:14px;}
  .horas-badge{display:inline-block;font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;background:var(--orange-dim);color:var(--orange);margin-left:6px;vertical-align:middle;}
  .horas-badge.critico{background:var(--red-dim);color:var(--red);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;font-size:14px;font-weight:500;z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;max-width:90vw;text-align:center;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.success{border-color:var(--green);color:var(--green);}
  .toast.error{border-color:var(--red);color:var(--red);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:24px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
  .modal-depa{font-size:22px;font-weight:600;margin-bottom:4px;}
  .modal-fecha{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:16px;}
  .modal-desc{font-size:15px;line-height:1.6;color:var(--text-dim);margin-bottom:20px;}
  .modal-actions{display:flex;gap:10px;}
  .modal-close{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;color:var(--text-muted);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .modal-resolver{flex:2;background:var(--green);border:none;border-radius:var(--radius-sm);padding:12px;color:#0f0f0f;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .section-label{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
  .logout-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;color:var(--text-muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .logout-btn:hover{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">Reportes · Mantenimiento</div>
  <div class="login-title">¿Quién eres?</div>
  <div class="login-sub">Selecciona tu rol e ingresa tu PIN</div>
  <div class="role-grid">
    <div class="role-btn" id="role-admin"><div class="role-icon">👑</div><div class="role-name">Administrador</div></div>
    <div class="role-btn" id="role-jefe"><div class="role-icon">📊</div><div class="role-name">Jefe</div></div>
    <div class="role-btn" id="role-mantenimiento"><div class="role-icon">🔧</div><div class="role-name">Mantenimiento</div></div>
    <div class="role-btn" id="role-campo"><div class="role-icon">🏃</div><div class="role-name">Campo</div></div>
  </div>
  <div class="pin-section">
    <div class="pin-label">PIN de acceso</div>
    <input type="password" class="pin-input" id="pinInput" maxlength="4" placeholder="••••" inputmode="numeric">
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">Entrar</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-greeting">BIENVENIDO</span>
      <span class="topbar-user" id="topbarUser">—</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="notif-bell" id="notifBell">🔔<div class="notif-badge" id="notifBadge">0</div></div>
      <button class="logout-btn" id="logoutBtn">Salir</button>
    </div>
  </div>
  <div class="content">
    <div class="tabs" id="tabsContainer"></div>
    <div id="nuevoReporteSection" style="display:none;">
      <div class="card">
        <div class="card-title">Nuevo Reporte</div>
        <div class="form-group">
          <label class="form-label">Departamento</label>
          <input type="text" class="form-input" id="inputDepa" placeholder="Ej: Rincón 104">
        </div>
        <div class="form-group">
          <label class="form-label">Descripción del problema</label>
          <textarea class="form-textarea" id="inputDesc" placeholder="Describe el problema con detalle..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Nivel de importancia</label>
          <div class="importancia-grid">
            <button class="imp-btn alta" id="imp-alta">🔴 Alta</button>
            <button class="imp-btn media" id="imp-media">🟡 Media</button>
            <button class="imp-btn baja" id="imp-baja">🟢 Baja</button>
          </div>
        </div>
        <button class="submit-btn" id="submitBtn">Enviar Reporte</button>
      </div>
      <div style="height:1px;background:var(--border);margin:4px 0 20px;"></div>
    </div>
    <div id="listaReportes"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <div class="modal-depa" id="modalDepa"></div>
      <div id="modalEstadoBadge"></div>
    </div>
    <div class="modal-fecha" id="modalFecha"></div>
    <div id="modalImpBadge" style="margin-bottom:14px;"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <div id="modalResolverInfo" style="display:none;margin-bottom:16px;">
      <div class="section-label">Resuelto por</div>
      <div id="modalResolverNombre" style="font-size:14px;color:var(--text-dim);"></div>
    </div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCqUaQ4yXgZAwMJKpNz71vV2kbLofRSpQ",
  authDomain: "reportes-airbnb-60abf.firebaseapp.com",
  projectId: "reportes-airbnb-60abf",
  storageBucket: "reportes-airbnb-60abf.firebasestorage.app",
  messagingSenderId: "22880360554",
  appId: "1:22880360554:web:78dc009d84d51e039a9213"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const TG_TOKEN   = '8462112004:AAFa8ZBfoJmHLg2pljfZmmIqstSGuEgSsjc';
const TG_CHAT_ID = '-5227411507';
const HORAS_CRITICO = 8;

const ROLES = {
  admin:         { nombre:'Administrador', pin:'1234', puedeCrear:true,  puedeResolver:false },
  jefe:          { nombre:'Jefe',          pin:'2222', puedeCrear:false, puedeResolver:true  },
  mantenimiento: { nombre:'Mantenimiento', pin:'3333', puedeCrear:false, puedeResolver:true  },
  campo:         { nombre:'Campo',         pin:'4444', puedeCrear:false, puedeResolver:true  },
};

let currentRole = null, currentUser = null, selectedRole = null;
let selectedImportancia = null, currentTab = 'pendientes';
let reportesCache = [];
let unsubscribe = null;
let modalReporteId = null;

// ── TELEGRAM ──────────────────────────────────────────────────
async function sendTelegram(msg) {
  try {
    await fetch(https://api.telegram.org/bot${TG_TOKEN}/sendMessage, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ chat_id:TG_CHAT_ID, text:msg, parse_mode:'HTML' })
    });
  } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────────
function formatFechaCorta(d) {
  if(!d) return '—';
  return new Date(d).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

function getFecha(r) {
  return r.fecha?.toDate ? r.fecha.toDate() : new Date(r.fecha || Date.now());
}

// ── LOGIN ─────────────────────────────────────────────────────
['admin','jefe','mantenimiento','campo'].forEach(role => {
  document.getElementById('role-'+role).addEventListener('click', () => {
    selectedRole = role;
    document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
    document.getElementById('role-'+role).classList.add('selected');
    document.getElementById('pinInput').focus();
    document.getElementById('loginError').textContent = '';
  });
});

document.getElementById('pinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

document.getElementById('loginBtn').addEventListener('click', doLogin);

function doLogin() {
  const pin = document.getElementById('pinInput').value.trim();
  if (!selectedRole) { document.getElementById('loginError').textContent='Selecciona tu rol primero'; return; }
  if (!pin) { document.getElementById('loginError').textContent='Ingresa tu PIN'; return; }
  const rol = ROLES[selectedRole];
  if (!rol || rol.pin !== pin) { document.getElementById('loginError').textContent='PIN incorrecto'; return; }
  currentRole = selectedRole; currentUser = rol.nombre;
  enterApp();
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  if (unsubscribe) unsubscribe();
  currentUser=null; currentRole=null; reportesCache=[];
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('pinInput').value='';
  document.getElementById('loginError').textContent='';
  selectedRole=null;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
});

// ── ENTER APP ─────────────────────────────────────────────────
function enterApp() {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topbarUser').textContent=currentUser;

  const puedeCrear = ROLES[currentRole].puedeCrear;
  const tabs = document.getElementById('tabsContainer');
  tabs.innerHTML = puedeCrear
    ? `<button class="tab" data-tab="nuevo">+ Nuevo</button>
       <button class="tab active" data-tab="pendientes">Pendientes</button>
       <button class="tab" data-tab="resueltos">Resueltos</button>`
    : `<button class="tab active" data-tab="pendientes">Pendientes</button>
       <button class="tab" data-tab="resueltos">Resueltos</button>`;

  tabs.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  document.getElementById('notifBell').addEventListener('click', () => switchTab('pendientes'));

  // Firestore en tiempo real
  const q = query(collection(db,'reportes'), orderBy('fecha','desc'));
  unsubscribe = onSnapshot(q, snapshot => {
    reportesCache = snapshot.docs.map(d => ({ id:d.id, ...d.data() }));
    if (currentTab !== 'nuevo') renderLista();
    updateNotifBadge();
  });

  switchTab('pendientes');
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const el = document.querySelector(.tab[data-tab="${tab}"]);
  if (el) el.classList.add('active');
  document.getElementById('nuevoReporteSection').style.display = (tab==='nuevo') ? 'block' : 'none';
  document.getElementById('listaReportes').style.display = (tab!=='nuevo') ? 'block' : 'none';
  if (tab !== 'nuevo') renderLista();
}

// ── IMPORTANCIA ───────────────────────────────────────────────
['alta','media','baja'].forEach(n => {
  document.getElementById('imp-'+n).addEventListener('click', () => {
    selectedImportancia = n;
    ['alta','media','baja'].forEach(x => document.getElementById('imp-'+x).classList.toggle('selected', x===n));
  });
});

// ── CREAR REPORTE ─────────────────────────────────────────────
document.getElementById('submitBtn').addEventListener('click', async () => {
  const depa = document.getElementById('inputDepa').value.trim();
  const desc = document.getElementById('inputDesc').value.trim();
  if (!depa) { showToast('Escribe el departamento','error'); return; }
  if (!desc) { showToast('Escribe la descripción','error'); return; }
  if (!selectedImportancia) { showToast('Selecciona la importancia','error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='Enviando...';

  try {
    await addDoc(collection(db,'reportes'), {
      depa, desc,
      importancia: selectedImportancia,
      fecha: serverTimestamp(),
      estado: 'pendiente',
      resolverPor: null,
      resolverFecha: null,
    });

    const impEmoji = {alta:'🔴',media:'🟡',baja:'🟢'}[selectedImportancia];
    const impLabel = {alta:'ALTA',media:'MEDIA',baja:'BAJA'}[selectedImportancia];
    await sendTelegram(${impEmoji} <b>REPORTE NUEVO</b>\n\n📍 <b>${depa}</b>\n⚠️ Importancia: <b>${impLabel}</b>\n📝 ${desc}\n\n🕐 ${formatFechaCorta(new Date())});

    document.getElementById('inputDepa').value='';
    document.getElementById('inputDesc').value='';
    selectedImportancia=null;
    ['alta','media','baja'].forEach(n=>document.getElementById('imp-'+n).classList.remove('selected'));
    showToast('Reporte enviado ✅','success');
    switchTab('pendientes');
  } catch(e) {
    showToast('Error al enviar','error');
    console.error(e);
  }
  btn.disabled=false; btn.textContent='Enviar Reporte';
});

// ── LISTA ─────────────────────────────────────────────────────
function renderLista() {
  const container = document.getElementById('listaReportes');
  const filtrados = reportesCache.filter(r => currentTab==='pendientes' ? r.estado==='pendiente' : r.estado==='resuelto');
  const orden = {alta:0,media:1,baja:2};
  if (currentTab==='pendientes') filtrados.sort((a,b)=>orden[a.importancia]-orden[b.importancia]);

  if (!filtrados.length) {
    container.innerHTML=<div class="empty-state"><div class="empty-icon">${currentTab==='pendientes'?'✅':'📋'}</div><p>${currentTab==='pendientes'?'No hay reportes pendientes':'No hay reportes resueltos'}</p></div>;
    return;
  }

  const ahora = new Date();
  container.innerHTML = filtrados.map(r => {
    const impLabel = {alta:'🔴 ALTA',media:'🟡 MEDIA',baja:'🟢 BAJA'}[r.importancia];
    const fecha = getFecha(r);
    let horasBadge = '';
    if (r.estado==='pendiente') {
      const h = Math.floor((ahora-fecha)/3600000);
      if (h>0) horasBadge=<span class="horas-badge ${h>=HORAS_CRITICO?'critico':''}">${h}h</span>;
    }
    return `<div class="reporte-card ${r.estado==='resuelto'?'resuelto':''}" data-id="${r.id}">
      <div class="reporte-header">
        <div><span class="reporte-depa">${r.depa}</span>${horasBadge}</div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">
          <span class="badge badge-${r.importancia}">${impLabel}</span>
          ${r.estado==='resuelto'?'<span class="badge badge-resuelto">RESUELTO</span>':''}
        </div>
      </div>
      <div class="reporte-desc">${r.desc}</div>
      <div class="reporte-footer">
        <span class="reporte-meta">${formatFechaCorta(fecha)}${r.estado==='resuelto'?' · '+(r.resolverPor||'—'):''}</span>
        ${r.estado==='pendiente'&&ROLES[currentRole].puedeResolver?<button class="resolver-btn" data-id="${r.id}">✓ Resuelto</button>:''}
      </div>
    </div>`;
  }).join('');

  // Events en tarjetas
  container.querySelectorAll('.reporte-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.classList.contains('resolver-btn')) return;
      openModal(card.dataset.id);
    });
  });

  container.querySelectorAll('.resolver-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      resolver(btn.dataset.id);
    });
  });
}

// ── RESOLVER ─────────────────────────────────────────────────
async function resolver(id) {
  const r = reportesCache.find(x=>x.id===id); if(!r) return;
  try {
    await updateDoc(doc(db,'reportes',id), {
      estado:'resuelto', resolverPor:currentUser, resolverFecha:serverTimestamp()
    });
    await sendTelegram(✅ <b>REPORTE RESUELTO</b>\n\n📍 <b>${r.depa}</b>\n📝 ${r.desc}\n\n👤 Resuelto por: <b>${currentUser}</b>\n🕐 ${formatFechaCorta(new Date())});
    closeModalDirect();
    showToast('Marcado como resuelto ✅','success');
  } catch(e) { showToast('Error al actualizar','error'); }
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(id) {
  const r = reportesCache.find(x=>x.id===id); if(!r) return;
  modalReporteId = id;
  const fecha = getFecha(r);
  document.getElementById('modalDepa').textContent=r.depa;
  document.getElementById('modalFecha').textContent=formatFechaCorta(fecha);
  document.getElementById('modalImpBadge').innerHTML=<span class="badge badge-${r.importancia}">${{alta:'🔴 ALTA',media:'🟡 MEDIA',baja:'🟢 BAJA'}[r.importancia]}</span>;
  document.getElementById('modalEstadoBadge').innerHTML=r.estado==='resuelto'?'<span class="badge badge-resuelto">RESUELTO</span>':'';
  document.getElementById('modalDesc').textContent=r.desc;
  const ri=document.getElementById('modalResolverInfo');
  if(r.estado==='resuelto'&&r.resolverPor){
    ri.style.display='block';
    const rf = r.resolverFecha?.toDate ? r.resolverFecha.toDate() : new Date();
    document.getElementById('modalResolverNombre').textContent=${r.resolverPor} · ${formatFechaCorta(rf)};
  } else ri.style.display='none';

  const actions=document.getElementById('modalActions');
  if(r.estado==='pendiente'&&ROLES[currentRole].puedeResolver){
    actions.innerHTML=<button class="modal-close" id="modalCloseBtn">Cerrar</button><button class="modal-resolver" id="modalResolverBtn">✓ Marcar resuelto</button>;
    document.getElementById('modalResolverBtn').addEventListener('click',()=>resolver(id));
  } else {
    actions.innerHTML=<button class="modal-close" style="flex:1;" id="modalCloseBtn">Cerrar</button>;
  }
  document.getElementById('modalCloseBtn').addEventListener('click', closeModalDirect);
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
});

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalReporteId = null;
}

// ── NOTIF BADGE ───────────────────────────────────────────────
function updateNotifBadge() {
  if(!currentRole) return;
  const n = reportesCache.filter(r=>r.estado==='pendiente').length;
  const b = document.getElementById('notifBadge');
  b.style.display=n>0?'flex':'none'; b.textContent=n;
}
</script>
</body>
</html>
